    const { useState, useEffect, useRef } = React;

const C = {
bg:”#080C14”, card:”#0D1220”, border:“rgba(255,255,255,0.07)”,
text:”#F0F4FF”, muted:”#8899BB”, dim:”#556677”,
gold:”#D4A843”, goldDim:“rgba(212,168,67,0.12)”, goldBorder:“rgba(212,168,67,0.25)”,
blue:”#4F8EF7”, green:”#34D399”, red:”#F87171”, violet:”#A78BFA”,
orange:”#FB923C”, teal:”#2DD4BF”,

function useInView(t=0.12){const ref=useRef(null);const[v,setV]=useState(false);useEffect(()=>{const el=ref.current;if(!el)return;const o=new IntersectionObserver(([e])=>{if(e.isIntersecting){setV(true);o.disconnect();}},{threshold:t});o.observe(el);return()=>o.disconnect();},[]);return[ref,v];}
function FadeIn({children,delay=0,className=””}){const[ref,v]=useInView();return <div ref={ref} className={className} style={{opacity:v?1:0,transform:v?“translateY(0)”:“translateY(28px)”,transition:`opacity 0.65s ease ${delay}s, transform 0.65s ease ${delay}s`}}>{children}</div>;}

function DOLogo({size=32}){return <div style={{display:“flex”,alignItems:“center”,gap:8}}><div style={{width:size,height:size,background:C.gold,clipPath:“polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%)”,display:“flex”,alignItems:“center”,justifyContent:“center”,fontSize:size*0.28,fontWeight:900,color:”#030712”,flexShrink:0}}>DO</div><div style={{fontFamily:“Georgia,serif”,fontWeight:700,fontSize:size*0.48,lineHeight:1}}><span style={{color:C.gold}}>D</span><span style={{color:C.text}}>eal</span><span style={{color:C.gold}}>O</span><span style={{color:C.text}}>ptima</span></div></div>;}

/* ── Exact app micro-components ── */
function MLabel({children}){return <div style={{fontSize:8,fontWeight:700,letterSpacing:“0.12em”,textTransform:“uppercase”,color:”#94A3B8”,marginBottom:4}}>{children}</div>;}
function MInput({label,value,prefix,suffix,active,glow}){return <div>{label&&<MLabel>{label}</MLabel>}<div style={{position:“relative”,display:“flex”,alignItems:“center”}}>{prefix&&<span style={{position:“absolute”,left:10,color:active?C.gold:C.muted,fontSize:12,pointerEvents:“none”,fontFamily:”‘DM Mono’,monospace”}}>{prefix}</span>}<div style={{width:“100%”,background:active?“rgba(212,168,67,0.05)”:“rgba(255,255,255,0.03)”,border:`1px solid ${active?"rgba(212,168,67,0.4)":glow||C.border}`,borderRadius:7,padding:`8px ${suffix?32:10}px 8px ${prefix?24:10}px`,color:C.text,fontSize:13,fontFamily:”‘DM Mono’,monospace”,fontWeight:500}}>{value}</div>{suffix&&<span style={{position:“absolute”,right:10,color:C.muted,fontSize:10,pointerEvents:“none”,fontFamily:”‘DM Mono’,monospace”}}>{suffix}</span>}</div></div>;}
function MST({children,color=C.gold}){return <div style={{display:“flex”,alignItems:“center”,gap:8,marginBottom:14}}><div style={{width:2,height:12,background:color,borderRadius:2,flexShrink:0}}/><span style={{fontSize:10,fontWeight:700,letterSpacing:“0.1em”,textTransform:“uppercase”,color}}>{children}</span></div>;}
function MToggle({label,active,color=C.gold}){return <div style={{display:“flex”,alignItems:“center”,gap:8,padding:“7px 12px”,borderRadius:7,border:`1px solid ${active?color+"50":C.border}`,background:active?color+“0F”:“rgba(255,255,255,0.02)”}}><div style={{width:14,height:14,borderRadius:4,border:`1.5px solid ${active?color:C.dim}`,background:active?color:“transparent”,flexShrink:0,display:“flex”,alignItems:“center”,justifyContent:“center”}}>{active&&<svg width="8" height="6" viewBox="0 0 9 7" fill="none"><path d="M1 3.5L3.5 6L8 1" stroke="#000" strokeWidth="1.5" strokeLinecap="round"/></svg>}</div><span style={{fontSize:10,color:active?C.text:C.muted,fontWeight:active?600:400}}>{label}</span></div>;}
function MStat({label,value,color,sub}){return <div style={{background:“rgba(255,255,255,0.02)”,border:`1px solid ${C.border}`,borderRadius:8,padding:“8px 6px”,textAlign:“center”}}><div style={{fontSize:7,letterSpacing:“0.08em”,textTransform:“uppercase”,color:C.dim,marginBottom:4}}>{label}</div><div style={{fontSize:12,fontWeight:700,color,fontFamily:”‘DM Mono’,monospace”}}>{value}</div>{sub&&<div style={{fontSize:7,color:C.dim,marginTop:2}}>{sub}</div>}</div>;}
function Tag({children,color=C.gold}){return <div style={{display:“inline-flex”,alignItems:“center”,gap:8,fontSize:10,fontWeight:700,letterSpacing:“0.16em”,textTransform:“uppercase”,color,marginBottom:12}}><div style={{width:20,height:1,background:color}}/>{children}</div>;}

function AppFrame({children,label}){return <div style={{background:“linear-gradient(145deg,#0A0F1A,#0D1220)”,border:`1px solid ${C.border}`,borderRadius:14,overflow:“hidden”,boxShadow:“0 20px 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(212,168,67,0.06)”}}><div style={{padding:“8px 14px”,borderBottom:`1px solid ${C.border}`,background:“rgba(8,12,20,0.95)”,display:“flex”,alignItems:“center”,justifyContent:“space-between”}}><div style={{display:“flex”,alignItems:“center”,gap:7}}><div style={{display:“flex”,gap:4}}><div style={{width:8,height:8,borderRadius:“50%”,background:”#FF5F57”}}/><div style={{width:8,height:8,borderRadius:“50%”,background:”#FEBC2E”}}/><div style={{width:8,height:8,borderRadius:“50%”,background:”#28C840”}}/></div><DOLogo size={18}/></div>{label&&<span style={{fontSize:8,padding:“2px 8px”,borderRadius:100,background:C.goldDim,color:C.gold,fontWeight:700}}>{label}</span>}</div><div style={{padding:14}}>{children}</div></div>;}

/* ═══ MOCKUP: Deal Structure ═══ */

x”,background:“rgba(52,211,153,0.08)”,border:“1px solid rgba(52,211,153,0.3)”,borderRadius:7,textAlign:“center”}}><div style={{fontSize:7,letterSpacing:“0.12em”,textTransform:“uppercase”,color:C.muted}}>LTV</div><div style={{fontSize:18,fontWeight:800,color:C.green,fontFamily:”‘DM Mono’,monospace”}}>85.2%</div></div></div></AppFrame>;}

/* ═══ MOCKUP: Credit Intelligence with Signal Cards ═══ */

ground:`${s.color}15`,borderRadius:3}}>{s.impact}</div></div><div style={{width:1,background:`${s.color}25`,alignSelf:“stretch”,flexShrink:0}}/><div style={{fontSize:9,color:C.muted,lineHeight:1.55}}>{s.txt}</div></div>)}</div></div><div className=“mg2” style={{display:“grid”,gap:6,marginTop:10}}><MToggle label="Prior RV Loan" active color={C.blue}/><MToggle label="Has Mortgage" active color={C.green}/><MToggle label="Long Employment (5+ yrs)" active color={C.green}/><MToggle label="Prior Auto Loan" active={false}/></div><div style={{marginTop:6,display:“flex”,alignItems:“flex-start”,gap:8,padding:“8px 10px”,background:“rgba(79,142,247,0.07)”,border:“1px solid rgba(79,142,247,0.22)”,borderRadius:7}}><div style={{display:“flex”,flexDirection:“column”,alignItems:“center”,flexShrink:0,minWidth:44}}><div style={{fontSize:7,letterSpacing:“0.06em”,textTransform:“uppercase”,color:C.dim,marginBottom:2}}>Prior RV</div><div style={{fontSize:10,fontWeight:800,color:C.blue,fontFamily:”‘DM Mono’,monospace”,padding:“1px 5px”,background:“rgba(79,142,247,0.15)”,borderRadius:3}}>+8</div></div><div style={{width:1,background:“rgba(79,142,247,0.22)”,alignSelf:“stretch”,flexShrink:0}}/><div style={{fontSize:9,color:C.muted,lineHeight:1.55}}><strong style={{color:C.blue}}>Strongest positive in recreational lending.</strong> Proves customer makes payments on a recreational asset. Fifth Third and US Bank specifically reward this.</div></div></AppFrame>;}

ius:2,overflow:“hidden”}}><div style={{height:“100%”,width:`${odds}%`,background:oc,borderRadius:2}}/></div><div style={{fontSize:14,fontWeight:700,color:oc,minWidth:36,textAlign:“right”,fontFamily:”‘DM Mono’,monospace”}}>{odds}%</div></div></div>;}
