{/* SCORING ENGINE */}
<Sec id="scoring">
<SL color={C.blue}>The Scoring Engine</SL>

<H2 sub="Proprietary. Transparent. Evolving.">Two Scores. One Answer.</H2>
<div className="g2">
<div style={{background:C.card,borderRadius:16,padding:"28px 24px",position:"relative",overflow:"hidden"}}><div style={{position:"absolute",top:0,left:0,right:0,height:3,background:C.blue}}/><div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}><div><div style={{fontSize:10,fontWeight:700,letterSpacing:"0.15em",textTransform:"uppercase",color:C.blue}}>The Deal Structure Score</div><div style={{fontSize:16,fontWeight:700,color:C.text,marginTop:6}}>How strong is this deal?</div></div><div style={{fontSize:36,fontWeight:900,color:C.blue,fontFamily:"'DM Mono',monospace"}}>78<span style={{fontSize:14,color:C.dim}}>/100</span></div></div><p style={{fontSize:13,color:C.muted,lineHeight:1.7,marginTop:14}}>Before a single lender is evaluated, the deal gets a health rating. LTV, DTI, down payment, FICO tier, credit depth, collections, housing — every factor weighted into one number.</p><p style={{fontSize:13,color:C.muted,lineHeight:1.7,marginTop:10}}>A 92 means most lenders will fight for it. A 54 means structural problems. The Deal Doctor reads this score and tells you exactly what to change.</p><div style={{fontSize:12,fontWeight:700,color:C.blue,fontStyle:"italic",marginTop:16}}>Visible to your F&I manager on every deal.</div></div>
<div style={{background:C.card,borderRadius:16,padding:"28px 24px",position:"relative",overflow:"hidden"}}><div style={{position:"absolute",top:0,left:0,right:0,height:3,background:C.gold}}/><div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}><div><div style={{fontSize:10,fontWeight:700,letterSpacing:"0.15em",textTransform:"uppercase",color:C.gold}}>The Lender Match Score</div><div style={{fontSize:16,fontWeight:700,color:C.text,marginTop:6}}>How well does this deal fit each bank?</div></div><div style={{fontSize:36,fontWeight:900,color:C.gold,fontFamily:"'DM Mono',monospace"}}>91<span style={{fontSize:14,color:C.dim}}>/100</span></div></div><p style={{fontSize:13,color:C.muted,lineHeight:1.7,marginTop:14}}>Each lender gets its own 0–100 composite score. FICO fit, LTV tolerance, DTI threshold, mileage cap, reserve opportunity — all weighted per lender.</p><p style={{fontSize:13,color:C.muted,lineHeight:1.7,marginTop:10}}>OZK scores 91 because LTV and FICO land in their sweet spot. Fifth Third scores 64 because their DTI threshold is tighter. The ranking isn't alphabetical — it's mathematical.</p><div style={{fontSize:12,fontWeight:700,color:C.gold,fontStyle:"italic",marginTop:16}}>Every lender ranked. Highest score = best path.</div></div>
</div>
<div style={{marginTop:24,background:C.card,borderRadius:12,padding:"20px 24px",border:`1px solid ${C.border}`}}><div style={{fontSize:10,fontWeight:700,letterSpacing:"0.15em",textTransform:"uppercase",color:C.violet,marginBottom:8}}>The Algorithm Evolves</div><p style={{fontSize:13,color:C.muted,lineHeight:1.7}}>Core ships with universal weights built from industry data. When you upgrade to Pro, the AI tunes these weights to YOUR store — your lenders, your deal mix, your approval history. Same engine. Smarter math. The scoring becomes yours.</p></div>
</Sec>
